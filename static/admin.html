<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kaka_moa 管理控制台</title>
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --border: #e2e5ea;
    --text: #1f2329; --muted: #6b7280; --accent: #2563eb;
    --accent-hover: #1d4ed8; --green: #16a34a; --red: #dc2626;
    --code-bg: #1e293b; --code-text: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 600; }
  h1 .tag { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 8px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
  .key-row { display: flex; gap: 10px; align-items: center; }
  .key-row input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: monospace;
  }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  button {
    padding: 8px 16px; border: 1px solid var(--border); background: var(--card);
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text);
    transition: all .15s;
  }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover:not(:disabled) { background: var(--accent-hover); color: #fff; }
  button.danger { color: var(--red); border-color: var(--border); }
  button.danger:hover:not(:disabled) { background: var(--red); color: #fff; border-color: var(--red); }
  textarea {
    width: 100%; height: 60vh; padding: 12px; border: 1px solid var(--border);
    border-radius: 6px; font-family: "Cascadia Code", "Consolas", monospace;
    font-size: 13px; line-height: 1.6; resize: vertical; background: var(--code-bg);
    color: var(--code-text); tab-size: 2;
  }
  .status {
    padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 12px;
    display: none; word-break: break-all;
  }
  .status.show { display: block; }
  .status.success { background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; }
  .status.error { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
  .status.info { background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; }
  .meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #cbd5e1;
    border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite;
    vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>kaka_moa 管理控制台 <span class="tag">Mixture of Agents</span></h1>
    <div style="font-size:12px;color:var(--muted)" id="healthTag">状态: 检查中...</div>
  </header>

  <div class="card">
    <h2>认证</h2>
    <div class="key-row">
      <input id="apiKey" type="password" placeholder="输入 MOA_API_KEY（与 .env 中 MOA_API_KEY 一致）">
      <button onclick="saveKey()">保存</button>
    </div>
  </div>

  <div class="card">
    <h2>模型配置（moa-config.yaml）</h2>
    <div class="btn-group">
      <button class="primary" onclick="loadConfig()">加载配置</button>
      <button onclick="saveConfig()">保存配置</button>
      <button onclick="reloadConfig()">重载配置（热生效）</button>
      <button class="danger" onclick="restartService()">重启服务</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="点击「加载配置」获取当前 moa-config.yaml 内容..."></textarea>
    <div class="meta" id="pathMeta"></div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const KEY_STORE = 'kaka_moa_api_key';

// 初始化
(function init() {
  const saved = localStorage.getItem(KEY_STORE);
  if (saved) $('apiKey').value = saved;
  checkHealth();
})();

function saveKey() {
  localStorage.setItem(KEY_STORE, $('apiKey').value);
  showStatus('API Key 已保存到本地', 'success');
}

async function api(method, path, body) {
  const key = $('apiKey').value.trim();
  if (!key) { throw new Error('请先填写 API Key'); }
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || data.message || ('HTTP ' + r.status));
  return data;
}

function showStatus(msg, type = 'info') {
  const el = $('status');
  el.className = 'status show ' + type;
  el.innerHTML = msg;
}

function setLoading(btn, loading, text) {
  if (loading) {
    btn.dataset.orig = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>' + (text || '处理中...');
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.orig || btn.textContent;
    btn.disabled = false;
  }
}

async function loadConfig() {
  const btn = event.target; setLoading(btn, true, '加载中');
  try {
    const data = await api('GET', '/admin/config');
    $('editor').value = data.content;
    $('pathMeta').textContent = '配置文件路径: ' + data.path;
    showStatus('配置加载成功', 'success');
  } catch (e) { showStatus('加载失败: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function saveConfig() {
  const btn = event.target; setLoading(btn, true, '保存中');
  try {
    const data = await api('POST', '/admin/config', { content: $('editor').value });
    showStatus('保存成功。' + data.message + ' （可点「重载配置」让其立即生效）', 'success');
  } catch (e) { showStatus('保存失败: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function reloadConfig() {
  const btn = event.target; setLoading(btn, true, '重载中');
  try {
    const data = await api('POST', '/admin/reload');
    showStatus('重载成功。' + data.message + ' （已加载 ' + '最新预设）', 'success');
    checkHealth();
  } catch (e) { showStatus('重载失败: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function restartService() {
  if (!confirm('确认重启服务？重启期间约 5 秒不可访问，需以 reload 模式或进程管理器运行才能自动恢复。')) return;
  const btn = event.target; setLoading(btn, true, '重启中');
  try {
    const data = await api('POST', '/admin/restart');
    showStatus(data.message + ' 页面将在 5 秒后自动刷新...', 'info');
    setTimeout(() => location.reload(), 5000);
  } catch (e) {
    showStatus('重启请求失败: ' + e.message + '（若服务已退出，需手动重启）', 'error');
  }
  // 不恢复按钮（服务重启中）
}

async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    $('healthTag').textContent = '状态: 运行中 · v' + d.version + ' · 预设数 ' + d.presets_count;
    $('healthTag').style.color = 'var(--green)';
  } catch (e) {
    $('healthTag').textContent = '状态: 不可达';
    $('healthTag').style.color = 'var(--red)';
  }
}

// 支持 Ctrl+S 保存
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveConfig(); }
});
</script>
</body>
</html>
