# kaka_moa 服务配置文件（真实测试配置）
# Reference 模型: qwen3.7-plus + glm-5.2，经 OneAPI（OpenAI 兼容）调用

server:
  host: "0.0.0.0"
  port: 7890
  api_key: "${MOA_API_KEY}"
  rate_limit: 100

moa_presets:
  - name: "moa-coding"
    description: "代码模型"

    references:
      - provider: "openai_compatible"
        model: "openai-gpt-5.6-sol"
        api_key: "${ONEAPI_API_KEY}"
        base_url: "${ONEAPI_BASE_URL}"
        temperature: 0.7
        max_tokens: 65536
        timeout: 300

      - provider: "openai_compatible"
        model: "glm-5.2"
        api_key: "${ONEAPI_API_KEY}"
        base_url: "${ONEAPI_BASE_URL}"
        temperature: 0.7
        max_tokens: 65536
        timeout: 300
        
      - provider: "openai_compatible"
        model: "kimi-k2.7-code"
        api_key: "${VOLCENGINE_API_KEY}"
        base_url: "https://ark.cn-beijing.volces.com/api/plan/v3"
        temperature: 0.7
        max_tokens: 32768
        timeout: 300

    aggregator:
      provider: "openai_compatible"
      model: "qwen3.7-max"
      api_key: "${ONEAPI_API_KEY}"
      base_url: "${ONEAPI_BASE_URL}"
      temperature: 0.3
      max_tokens: 65536
      timeout: 300

    aggregator_prompt: |
      你是一个专业的回答汇总助手。以下是多个 AI 助手对同一问题的独立回答：

      {reference_responses}

      请综合分析以上回答，提取最有价值的信息，生成一个更全面、准确、有用的最终回答。
      要求：
      1. 保留各回答中的正确信息
      2. 如果有冲突，选择最可靠的答案
      3. 补充遗漏的重要细节
      4. 用清晰的结构组织答案
